
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mi Día">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%2334C759'/%3E%3Ctext x='90' y='118' font-size='90' text-anchor='middle' fill='white' font-family='-apple-system'%3E📋%3C/text%3E%3C/svg%3E">
<title>Mi Día</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #F2F2F7;
    --card: #FFFFFF;
    --text: #000000;
    --text-2: #8E8E93;
    --separator: #E5E5EA;
    --green: #34C759;
    --red: #FF3B30;
    --blue: #007AFF;
    --orange: #FF9500;
    --purple: #AF52DE;
    --yellow: #FFCC00;
  }
  html, body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
    color: var(--text);
    overscroll-behavior-y: none;
    height: 100%;
  }
  body {
    padding-bottom: calc(83px + env(safe-area-inset-bottom));
    padding-top: env(safe-area-inset-top);
  }
  .app { max-width: 640px; margin: 0 auto; min-height: 100vh; }

  /* Header */
  .header {
    padding: 8px 20px 12px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(242, 242, 247, 0.85);
  }
  .header h1 {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.4px;
  }
  .header .date { font-size: 15px; color: var(--text-2); margin-top: 2px; }

  /* Sections */
  .view { display: none; padding: 0 16px 20px; }
  .view.active { display: block; }

  /* Cards */
  .card {
    background: var(--card);
    border-radius: 14px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .card-title {
    font-size: 13px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    padding: 0 16px 8px;
    margin-top: 24px;
    font-weight: 500;
  }
  .row {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 0.5px solid var(--separator);
    min-height: 44px;
  }
  .row:last-child { border-bottom: none; }
  .row-left { display: flex; align-items: center; gap: 12px; flex: 1; }
  .row-icon {
    width: 30px; height: 30px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .row-text { font-size: 17px; flex: 1; }
  .row-text.checked { text-decoration: line-through; color: var(--text-2); }
  .row-detail { font-size: 13px; color: var(--text-2); margin-top: 2px; }

  /* Checkbox circle */
  .check {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid #C7C7CC;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .check.on {
    background: var(--green);
    border-color: var(--green);
  }
  .check.on::after {
    content: '✓'; color: white; font-size: 14px; font-weight: 700;
  }

  /* Habit toggle (3-state for food: bien/mal/sin) */
  .habit-toggle {
    display: flex; gap: 6px;
  }
  .h-btn {
    border: none;
    background: var(--separator);
    padding: 6px 12px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    transition: all 0.15s;
    cursor: pointer;
  }
  .h-btn.active-good { background: var(--green); color: white; }
  .h-btn.active-bad { background: var(--red); color: white; }

  /* Tab bar */
  .tabbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid var(--separator);
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 100;
  }
  .tabs {
    display: flex;
    max-width: 640px;
    margin: 0 auto;
  }
  .tab {
    flex: 1;
    border: none;
    background: none;
    padding: 8px 0 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    color: var(--text-2);
    font-size: 10px;
    font-weight: 500;
    cursor: pointer;
  }
  .tab.active { color: var(--blue); }
  .tab-icon { font-size: 22px; }

  /* Menu day */
  .day-card {
    background: var(--card);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .day-header {
    padding: 12px 16px;
    background: var(--bg);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border-bottom: 0.5px solid var(--separator);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .day-emoji { font-size: 18px; }
  .ingredients {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 10px;
  }
  .ing {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 8px;
    background: #F2F2F7;
    color: var(--text-2);
    font-weight: 500;
  }
  .ing.missing {
    background: #FFE5E5;
    color: var(--red);
    font-weight: 700;
  }
  .opt {
    padding: 14px 16px;
    border-bottom: 0.5px solid var(--separator);
  }
  .opt:last-child { border-bottom: none; }
  .opt-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--blue);
    margin-bottom: 4px;
  }
  .opt-text { font-size: 15px; line-height: 1.35; }

  /* Stats */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat {
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
  }
  .stat-label { font-size: 13px; color: var(--text-2); margin-bottom: 4px; }
  .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .stat-sub { font-size: 12px; color: var(--text-2); margin-top: 2px; }

  /* Heatmap */
  .heatmap {
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .hm-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .hm-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .hm-day {
    aspect-ratio: 1;
    border-radius: 4px;
    background: var(--separator);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: rgba(0,0,0,0.55);
    position: relative;
    padding: 1px;
    gap: 0;
    line-height: 1.1;
  }
  .hm-day.l0 { background: #FF3B30; color: white; }
  .hm-day.l1 { background: #FF8C42; color: white; }
  .hm-day.l2 { background: #FFCC00; color: #5C3F00; }
  .hm-day.l3 { background: #8FD143; color: #2D4A00; }
  .hm-day.l4 { background: #34C759; color: white; }
  .hm-day .num { font-size: 13px; line-height: 1; font-weight: 700; }
  .hm-day .food-icon { font-size: 12px; line-height: 1; margin-top: 1px; }
  .hm-day .star-icon {
    position: absolute;
    top: -4px;
    right: -3px;
    font-size: 11px;
    color: #FFD700;
    text-shadow: 0 0 3px rgba(0,0,0,0.5);
    z-index: 2;
    line-height: 1;
  }
  .hm-legend {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 11px;
    color: var(--text-2);
    margin-top: 10px;
    justify-content: flex-end;
  }
  .hm-leg { width: 10px; height: 10px; border-radius: 2px; }

  /* Filter chips */
  .chips {
    display: flex;
    gap: 8px;
    padding: 0 16px 12px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    border: none;
    background: var(--card);
    padding: 8px 14px;
    border-radius: 16px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    cursor: pointer;
    flex-shrink: 0;
  }
  .chip.active { background: var(--blue); color: white; }

  /* Reset button */
  .reset-btn {
    width: 100%;
    padding: 14px;
    background: var(--card);
    border: none;
    border-radius: 14px;
    font-size: 16px;
    color: var(--red);
    font-weight: 500;
    margin-top: 16px;
    cursor: pointer;
  }

  /* Date nav for tracker */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 16px;
  }
  .date-nav button {
    border: none;
    background: none;
    font-size: 22px;
    color: var(--blue);
    cursor: pointer;
    padding: 4px 8px;
  }
  .date-nav .current {
    font-size: 17px;
    font-weight: 600;
  }

  /* Hidden by default for sub-views */
  .recipe {
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .recipe h3 { font-size: 17px; margin-bottom: 6px; }
  .recipe p { font-size: 14px; line-height: 1.4; color: #3C3C43; margin-bottom: 6px; }
  .recipe .label { font-weight: 600; color: var(--text); }

  .empty { text-align: center; color: var(--text-2); padding: 40px 20px; font-size: 15px; }

  /* Modal del día */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .modal-backdrop.active { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 16px;
    width: 100%;
    max-width: 360px;
    overflow: hidden;
    animation: modalIn 0.2s ease-out;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px 12px;
    border-bottom: 0.5px solid var(--separator);
  }
  .modal-title {
    font-size: 17px;
    font-weight: 600;
  }
  .modal-close {
    border: none;
    background: var(--separator);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-size: 13px;
    color: var(--text-2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-body { padding: 8px 0; }
  .modal-row {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 0.5px solid var(--separator);
  }
  .modal-row:last-child { border-bottom: none; }
  .modal-row-left {
    display: flex; align-items: center; gap: 10px;
  }
  .modal-row-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .modal-status { font-size: 18px; }
  .modal-summary {
    background: var(--bg);
    padding: 12px 16px;
    text-align: center;
    font-size: 14px;
    color: var(--text-2);
  }
  .modal-summary strong { color: var(--text); font-size: 15px; }

  .hm-day { cursor: pointer; }
</style>
</head>
<body>
<div class="app">

  <!-- HOY (TRACKER) -->
  <div class="view active" id="view-hoy">
    <div class="header">
      <h1>Hoy</h1>
      <div class="date" id="today-date"></div>
    </div>

    <div class="date-nav">
      <button onclick="changeDate(-1)">‹</button>
      <div class="current" id="current-date"></div>
      <button onclick="changeDate(1)">›</button>
    </div>

    <div class="card-title">Hábitos</div>
    <div class="card" id="habits-card"></div>

    <div class="card-title">Comida del día</div>
    <div class="card">
      <div class="row">
        <div class="row-left">
          <div class="row-icon" style="background:#FFE5E5;color:var(--red)">🍽</div>
          <div class="row-text">¿Comiste bien hoy?</div>
        </div>
        <div class="habit-toggle" id="food-toggle">
          <button class="h-btn" onclick="setFood('good')">Bien</button>
          <button class="h-btn" onclick="setFood('bad')">Mal</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MENÚ -->
  <div class="view" id="view-menu">
    <div class="header">
      <h1>Menú</h1>
      <div class="date">Semana A / B</div>
    </div>
    <div class="chips">
      <button class="chip active" onclick="filterMenu('A', this)">Opción A</button>
      <button class="chip" onclick="filterMenu('B', this)">Opción B</button>
      <button class="chip" onclick="filterMenu('viandas', this)">Viandas Maite</button>
      <button class="chip" onclick="filterMenu('recetas', this)">Recetas</button>
    </div>
    <div id="menu-content"></div>
  </div>

  <!-- COMPRAS -->
  <div class="view" id="view-compras">
    <div class="header">
      <h1>Compras</h1>
      <div class="date" id="compras-progress">0 de 0 marcados</div>
    </div>
    <div class="chips">
      <button class="chip active" onclick="filterCompras('mensual', this)">Mensuales</button>
      <button class="chip" onclick="filterCompras('semanaA', this)">Semana A</button>
      <button class="chip" onclick="filterCompras('semanaB', this)">Semana B</button>
    </div>
    <div id="compras-content"></div>
    <button class="reset-btn" onclick="resetCompras()">Desmarcar todo</button>
  </div>

  <!-- STATS -->
  <div class="view" id="view-stats">
    <div class="header">
      <h1>Estadísticas</h1>
      <div class="date">Últimos 5 días</div>
    </div>
    <div class="heatmap">
      <div class="hm-title">Cumplimiento últimos 35 días</div>
      <div class="hm-grid" id="heatmap"></div>
      <div class="hm-legend">
        <span>Mal</span>
        <span class="hm-leg" style="background:#FF3B30"></span>
        <span class="hm-leg" style="background:#FF8C42"></span>
        <span class="hm-leg" style="background:#FFCC00"></span>
        <span class="hm-leg" style="background:#8FD143"></span>
        <span class="hm-leg" style="background:#34C759"></span>
        <span>Bien</span>
        <span style="margin-left:8px">🥬 comió bien · 🍕 mal · ★ 5/5</span>
      </div>
    </div>
    <div class="stat-grid" id="stat-grid"></div>
  </div>

  <!-- Day detail modal -->
  <div class="modal-backdrop" id="day-modal" onclick="closeDayModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title" id="day-modal-title"></div>
        <button class="modal-close" onclick="closeDayModal()">✕</button>
      </div>
      <div class="modal-body" id="day-modal-body"></div>
    </div>
  </div>

</div>

<!-- TAB BAR -->
<nav class="tabbar">
  <div class="tabs">
    <button class="tab active" onclick="showView('hoy', this)">
      <span class="tab-icon">✓</span>
      <span>Hoy</span>
    </button>
    <button class="tab" onclick="showView('menu', this)">
      <span class="tab-icon">🍽</span>
      <span>Menú</span>
    </button>
    <button class="tab" onclick="showView('compras', this)">
      <span class="tab-icon">🛒</span>
      <span>Compras</span>
    </button>
    <button class="tab" onclick="showView('stats', this)">
      <span class="tab-icon">📊</span>
      <span>Stats</span>
    </button>
  </div>
</nav>

<script>
// ============ DATA ============
const HABITS = [
  { id: 'ejercicio', label: 'Ejercicio', icon: '💪', color: '#FF9500', bg: '#FFF0DB' },
  { id: 'pastillas', label: 'Pastillas', icon: '💊', color: '#007AFF', bg: '#DCEBFF' },
  { id: 'creatina', label: 'Creatina', icon: '🥤', color: '#AF52DE', bg: '#F2E1FB' },
  { id: 'pasos', label: '10k pasos', icon: '👟', color: '#34C759', bg: '#D6F4DD' },
];

const MENU = {
  A: [
    { dia: 'Lunes', plato: 'Merluza al horno con papas, cebolla y morrón + ensalada verde',
      ingredientes: ['Merluza filet', 'Papas', 'Cebolla', 'Morrón', 'Lechuga'] },
    { dia: 'Martes', plato: 'Guiso mixto (lentejas + porotos) con calabaza, zanahoria y choclo',
      ingredientes: ['Lentejas', 'Porotos colorados', 'Calabaza', 'Zanahoria', 'Choclo lata'] },
    { dia: 'Miércoles', plato: 'Pollo al horno con batata + coliflor asado con ajo y parmesano',
      ingredientes: ['Pechuga de pollo', 'Batata', 'Coliflor', 'Queso rallado'] },
    { dia: 'Jueves', plato: 'Tarta de acelga y queso + ensalada de zanahoria y huevo duro',
      ingredientes: ['Acelga', 'Queso rallado', 'Ricota', 'Zanahoria', 'Huevos', 'Lechuga'] },
    { dia: 'Viernes', plato: 'Salmón a la plancha + quinoa con hongos + brócoli salteado',
      ingredientes: ['Salmón filet', 'Quinoa', 'Hongos frescos', 'Brócoli'] },
  ],
  B: [
    { dia: 'Lunes', plato: 'Wok de pollo con morrón, brócoli y cebolla + arroz integral',
      ingredientes: ['Pechuga de pollo', 'Morrón', 'Brócoli', 'Cebolla', 'Arroz integral'] },
    { dia: 'Martes', plato: 'Risotto de hongos con parmesano + ensalada rúcula y tomate',
      ingredientes: ['Arroz integral', 'Hongos frescos', 'Queso rallado', 'Rúcula', 'Tomate'] },
    { dia: 'Miércoles', plato: 'Pastel de calabaza y osobuco + ensalada',
      ingredientes: ['Calabaza', 'Osobuco', 'Lechuga'] },
    { dia: 'Jueves', plato: 'Milanesas de berenjena al horno con puré mixto',
      ingredientes: ['Berenjenas', 'Huevos', 'Pan lactal int.', 'Papas', 'Calabaza'] },
    { dia: 'Viernes', plato: 'Canelones de acelga y ricota + ensalada verde',
      ingredientes: ['Masa canelones', 'Acelga', 'Ricota', 'Lechuga'] },
  ],
  viandas: [
    { dia: 'Lunes', desayuno: 'Hummus + bastones zanahoria/pepino', merienda: 'Muffin banana + manzana' },
    { dia: 'Martes', desayuno: 'Chipá (3) + uvas', merienda: 'Hummus + bastones' },
    { dia: 'Miércoles', desayuno: 'Muffin zanahoria + mandarina', merienda: 'Galletitas avena-banana + manzana' },
    { dia: 'Jueves', desayuno: 'Hummus + bastones', merienda: 'Barrita casera + banana' },
    { dia: 'Viernes', desayuno: 'Scones integrales + mandarina', merienda: 'Chipá + uvas' },
  ]
};

const RECETAS = [
  {
    nombre: 'Hummus',
    ingredientes: 'Garbanzos 400g cocidos · Tahini 3 cdas · Limón 2 · Ajo 2 dientes · Comino 1 cdita · Sal · Aceite oliva',
    preparacion: 'Procesá garbanzos + tahini + jugo limón + ajo + comino + sal. Agregá agua de a poco hasta cremoso. Servir con aceite oliva encima. Dura 5 días en heladera.'
  },
  {
    nombre: 'Chipá',
    ingredientes: 'Almidón de mandioca 500g · Queso rallado 300g · Huevos 3 · Manteca 100g derretida · Leche 150ml · Sal 1 cdita',
    preparacion: 'Mezclar almidón + queso + sal. Batir huevos + manteca + leche, incorporar a secos. Formar bolitas, hornear 180°C 20-25 min hasta dorados. Congelar sobras.'
  },
  {
    nombre: 'Muffins de Banana',
    ingredientes: 'Bananas maduras 3 pisadas · Huevo 1 · Aceite 80ml · Azúcar 100g · Harina integral 200g · Polvo hornear 2 cditas · Canela 1 cdita',
    preparacion: 'Mezclar banana + huevo + aceite + azúcar. Incorporar harina + polvo + canela. Rellenar moldes 3/4, hornear 180°C 20 min. Duran 3 días.'
  },
  {
    nombre: 'Muffins de Zanahoria',
    ingredientes: 'Zanahoria rallada 200g · Huevo 1 · Aceite 80ml · Azúcar 80g · Harina integral 180g · Polvo hornear 2 cditas · Canela 1 cdita · Nuez moscada pizca',
    preparacion: 'Mezclar zanahoria + huevo + aceite + azúcar. Incorporar harina + polvo + especias. Rellenar moldes 3/4, hornear 180°C 22 min. Duran 3 días.'
  },
  {
    nombre: 'Scones Integrales',
    ingredientes: 'Harina integral 300g · Polvo hornear 3 cditas · Sal pizca · Manteca fría 60g · Miel 2 cdas · Leche 150ml',
    preparacion: 'Mezclar harina + polvo + sal. Incorporar manteca con manos hasta arenoso. Agregar miel + leche, unir sin amasar. Estirar 2cm, cortar círculos, hornear 200°C 15 min. Duran 2 días.'

// ============ STATE ============
let currentDate = new Date();
currentDate.setHours(0,0,0,0);

function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getTracker() {
  return JSON.parse(localStorage.getItem('tracker') || '{}');
}
function saveTracker(data) {
  localStorage.setItem('tracker', JSON.stringify(data));
}
function getDay(date) {
  const data = getTracker();
  return data[dateKey(date)] || {};
}
function setDay(date, key, value) {
  const data = getTracker();
  const k = dateKey(date);
  data[k] = data[k] || {};
  data[k][key] = value;
  saveTracker(data);
}

function getCompras() {
  return JSON.parse(localStorage.getItem('compras') || '{}');
}
function setCompra(id, value) {
  const data = getCompras();
  data[id] = value;
  localStorage.setItem('compras', JSON.stringify(data));
}

let currentMenu = 'A';
let currentCompras = 'mensual';

// ============ RENDER ============
function fmtDate(d) {
  return d.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
}

function renderHoy() {
  document.getElementById('today-date').textContent = fmtDate(new Date());
  const today = new Date(); today.setHours(0,0,0,0);
  const isToday = currentDate.getTime() === today.getTime();
  document.getElementById('current-date').textContent = isToday ? 'Hoy' : fmtDate(currentDate);

  const day = getDay(currentDate);
  const card = document.getElementById('habits-card');
  card.innerHTML = HABITS.map(h => `
    <div class="row" onclick="toggleHabit('${h.id}')">
      <div class="row-left">
        <div class="row-icon" style="background:${h.bg};color:${h.color}">${h.icon}</div>
        <div class="row-text ${day[h.id] ? 'checked' : ''}">${h.label}</div>
      </div>
      <div class="check ${day[h.id] ? 'on' : ''}"></div>
    </div>
  `).join('');

  const foodToggle = document.getElementById('food-toggle');
  foodToggle.children[0].className = 'h-btn' + (day.food === 'good' ? ' active-good' : '');
  foodToggle.children[1].className = 'h-btn' + (day.food === 'bad' ? ' active-bad' : '');
}

function toggleHabit(id) {
  const day = getDay(currentDate);
  setDay(currentDate, id, !day[id]);
  renderHoy();
}

function setFood(val) {
  const day = getDay(currentDate);
  setDay(currentDate, 'food', day.food === val ? null : val);
  renderHoy();
}

function changeDate(delta) {
  const d = new Date(currentDate);
  d.setDate(d.getDate() + delta);
  const today = new Date(); today.setHours(0,0,0,0);
  if (d > today) return;
  currentDate = d;
  renderHoy();
}

function getWeekDates() {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow = today.getDay(); // 0 = Dom, 1 = Lun
  const offset = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(today);
  monday.setDate(today.getDate() + offset);
  const dates = {};
  ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'].forEach((dia, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates[dia] = d;
  });
  return dates;
}

function foodEmoji(date) {
  const today = new Date(); today.setHours(0,0,0,0);
  if (date > today) return '';
  const day = getDay(date);
  if (day.food === 'good') return '🥬';
  if (day.food === 'bad') return '🍕';
  return '';
}

function isIngredientChecked(ingredient, weekScope) {
  const compras = getCompras();
  return !!compras[ingredient];
}

function renderMenu() {
  const c = document.getElementById('menu-content');
  if (currentMenu === 'recetas') {
    c.innerHTML = RECETAS.map(r => `
      <div class="recipe">
        <h3>${r.nombre}</h3>
        <p><span class="label">Ingredientes:</span> ${r.ingredientes}</p>
        <p><span class="label">Preparación:</span> ${r.preparacion}</p>
      </div>
    `).join('');
  } else if (currentMenu === 'viandas') {
    c.innerHTML = MENU.viandas.map(d => `
      <div class="day-card">
        <div class="day-header"><span>${d.dia}</span></div>
        <div class="opt"><div class="opt-label">DESAYUNO</div><div class="opt-text">${d.desayuno}</div></div>
        <div class="opt"><div class="opt-label">MERIENDA</div><div class="opt-text">${d.merienda}</div></div>
      </div>
    `).join('');
  } else {
    c.innerHTML = MENU[currentMenu].map(d => {
      const chips = (d.ingredientes || []).map(ing => {
        const have = isIngredientChecked(ing, currentMenu);
        return `<span class="ing ${have ? '' : 'missing'}">${ing}</span>`;
      }).join('');
      return `
        <div class="day-card">
          <div class="day-header"><span>${d.dia}</span></div>
          <div class="opt">
            <div class="opt-text">${d.plato}</div>
            <div class="ingredients">${chips}</div>
          </div>
        </div>
      `;
    }).join('');
  }
}

function filterMenu(opt, btn) {
  currentMenu = opt;
  document.querySelectorAll('#view-menu .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderMenu();
}

function renderCompras() {
  const c = document.getElementById('compras-content');
  const compras = getCompras();
  let total = 0, done = 0;
  c.innerHTML = COMPRAS[currentCompras].map(g => {
    return `<div class="card-title">${g.cat}</div><div class="card">` +
      g.items.map(([nombre, cant]) => {
        const id = nombre; // key compartida (sin prefijo de scope)
        const checked = !!compras[id];
        total++; if (checked) done++;
        return `
          <div class="row" onclick="toggleCompra('${id.replace(/'/g, "\\'")}')">
            <div class="row-left">
              <div class="row-text ${checked ? 'checked' : ''}">${nombre}</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <div class="row-detail" style="margin:0">${cant}</div>
              <div class="check ${checked ? 'on' : ''}"></div>
            </div>
          </div>
        `;
      }).join('') + `</div>`;
  }).join('');
  document.getElementById('compras-progress').textContent = `${done} de ${total} marcados`;
}

function toggleCompra(id) {
  const compras = getCompras();
  setCompra(id, !compras[id]);
  renderCompras();
}

function filterCompras(opt, btn) {
  currentCompras = opt;
  document.querySelectorAll('#view-compras .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderCompras();
}

function resetCompras() {
  const labels = { mensual: 'Mensuales', semanaA: 'Semana A', semanaB: 'Semana B' };
  if (confirm(`¿Desmarcar todos los items de "${labels[currentCompras]}"?`)) {
    const compras = getCompras();
    // Sólo desmarca los items presentes en la lista activa (otros scope quedan intactos)
    COMPRAS[currentCompras].forEach(g => {
      g.items.forEach(([nombre]) => {
        delete compras[nombre];
      });
    });
    localStorage.setItem('compras', JSON.stringify(compras));
    renderCompras();
  }
}

function renderStats() {
  const data = getTracker();
  const now = new Date();
  const today0 = new Date(now); today0.setHours(0,0,0,0);

  // Función helper: color según X/5 (igual que heatmap)
  function colorClass(x) {
    const score = x * 20; // 0,20,40,60,80,100
    if (score === 0)         return { bg: '#F2F2F7', fg: '#8E8E93' };
    if (score < 20)          return { bg: '#FF3B30', fg: 'white' };
    if (score < 40)          return { bg: '#FF8C42', fg: 'white' };
    if (score < 60)          return { bg: '#FFCC00', fg: '#5C3F00' };
    if (score < 80)          return { bg: '#8FD143', fg: '#2D4A00' };
    return { bg: '#34C759', fg: 'white' };
  }

  // Contar últimos 5 días (incluye hoy)
  const last5 = [];
  for (let i = 4; i >= 0; i--) {
    const d = new Date(today0);
    d.setDate(d.getDate() - i);
    last5.push(data[dateKey(d)] || {});
  }

  const stats = HABITS.map(h => {
    const count = last5.filter(d => d[h.id]).length;
    return { ...h, count };
  });
  const goodFoodCount = last5.filter(d => d.food === 'good').length;

  const grid = document.getElementById('stat-grid');
  const allStats = [
    ...stats,
    { icon: '🥬', label: 'Comida bien', count: goodFoodCount }
  ];

  grid.innerHTML = allStats.map(s => {
    const c = colorClass(s.count);
    return `
      <div class="stat" style="background:${c.bg};color:${c.fg}">
        <div class="stat-label" style="color:${c.fg};opacity:0.85">${s.icon} ${s.label}</div>
        <div class="stat-value" style="color:${c.fg}">${s.count}/5</div>
        <div class="stat-sub" style="color:${c.fg};opacity:0.75">últimos 5 días</div>
      </div>
    `;
  }).join('');
  // Heatmap últimos 35 días
  const hm = document.getElementById('heatmap');
  // Pesos: comida 50%, ejercicio 30%, pasos 10%, creatina 7%, pastillas 3%
  const W = { food: 50, ejercicio: 30, pasos: 10, creatina: 7, pastillas: 3 };
  let hmHtml = '';
  for (let i = 34; i >= 0; i--) {
    const d = new Date(today0);
    d.setDate(d.getDate() - i);
    const k = dateKey(d);
    const day = data[k] || {};

    // Día futuro: gris vacío (no clickeable)
    if (d > today0) {
      hmHtml += `<div class="hm-day" style="cursor:default"></div>`;
      continue;
    }

    // Contar cumplidos y peso ponderado (0 a 100)
    let count = 0;
    let score = 0;
    if (day.ejercicio) { count++; score += W.ejercicio; }
    if (day.pastillas) { count++; score += W.pastillas; }
    if (day.creatina)  { count++; score += W.creatina; }
    if (day.pasos)     { count++; score += W.pasos; }
    if (day.food === 'good') { count++; score += W.food; }

    // ¿Hay al menos una selección hecha?
    const hasAnySelection = count > 0 || day.food === 'bad';

    // Gradient gris → rojo → amarillo → verde (escalones de 20)
    let cls;
    if (!hasAnySelection)    cls = '';     // gris (nada registrado)
    else if (score < 20)     cls = 'l0';   // rojo intenso
    else if (score < 40)     cls = 'l1';   // rojo-naranja
    else if (score < 60)     cls = 'l2';   // amarillo
    else if (score < 80)     cls = 'l3';   // verde-amarillo
    else                     cls = 'l4';   // verde fuerte

    const star = count === 5 ? '<span class="star-icon">★</span>' : '';
    const fEmoji = day.food === 'good' ? '🥬' : day.food === 'bad' ? '🍕' : '';
    const num = count > 0 ? `<span class="num">${count}</span>` : '';
    const fIcon = fEmoji ? `<span class="food-icon">${fEmoji}</span>` : '';

    hmHtml += `<div class="hm-day ${cls}" onclick="showDayDetail('${k}')" title="${k}: ${count}/5 (${score} pts)">${num}${fIcon}${star}</div>`;
  }
  hm.innerHTML = hmHtml;
}

function showDayDetail(dateKey) {
  const data = getTracker();
  const day = data[dateKey] || {};
  const [y, m, d] = dateKey.split('-').map(Number);
  const dateObj = new Date(y, m - 1, d);
  const formatted = dateObj.toLocaleDateString('es-AR', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });

  // Score
  const W = { food: 50, ejercicio: 30, pasos: 10, creatina: 7, pastillas: 3 };
  let count = 0, score = 0;
  if (day.ejercicio) { count++; score += W.ejercicio; }
  if (day.pastillas) { count++; score += W.pastillas; }
  if (day.creatina)  { count++; score += W.creatina; }
  if (day.pasos)     { count++; score += W.pasos; }
  if (day.food === 'good') { count++; score += W.food; }

  document.getElementById('day-modal-title').textContent =
    formatted.charAt(0).toUpperCase() + formatted.slice(1);

  const rows = HABITS.map(h => `
    <div class="modal-row">
      <div class="modal-row-left">
        <div class="modal-row-icon" style="background:${h.bg};color:${h.color}">${h.icon}</div>
        <div>${h.label}</div>
      </div>
      <div class="modal-status">${day[h.id] ? '✅' : '⬜️'}</div>
    </div>
  `).join('');

  const foodIcon = day.food === 'good' ? '🥬' :
                   day.food === 'bad'  ? '🍕' : '⬜️';
  const foodLabel = day.food === 'good' ? 'Bien' :
                    day.food === 'bad'  ? 'Mal' : 'Sin registrar';

  const foodRow = `
    <div class="modal-row">
      <div class="modal-row-left">
        <div class="modal-row-icon" style="background:#FFE5E5;color:var(--red)">🍽</div>
        <div>Comida</div>
      </div>
      <div class="modal-status">${foodIcon} <span style="font-size:14px;color:var(--text-2);margin-left:4px">${foodLabel}</span></div>
    </div>
  `;

  document.getElementById('day-modal-body').innerHTML =
    rows + foodRow +
    `<div class="modal-summary">Cumplimiento: <strong>${count}/5</strong> · <strong>${score} pts</strong></div>`;

  document.getElementById('day-modal').classList.add('active');
}

function closeDayModal(event) {
  if (event && event.target.id !== 'day-modal' && !event.target.classList.contains('modal-close')) {
    if (event.currentTarget !== event.target) return;
  }
  document.getElementById('day-modal').classList.remove('active');
}

// ============ NAVIGATION ============
function showView(view, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (view === 'menu') renderMenu();
  if (view === 'compras') renderCompras();
  if (view === 'stats') renderStats();
  if (view === 'hoy') renderHoy();
  window.scrollTo(0, 0);
}

// ============ INIT ============
// Migración: keys viejas con prefijo (mensual-X, semanaA-X, semanaB-X) → solo X
(function migrateCompras() {
  const compras = getCompras();
  let changed = false;
  Object.keys(compras).forEach(k => {
    const m = k.match(/^(mensual|semanaA|semanaB)-(.+)$/);
    if (m && compras[k]) {
      compras[m[2]] = true;
      delete compras[k];
      changed = true;
    } else if (m) {
      delete compras[k];
      changed = true;
    }
  });
  if (changed) localStorage.setItem('compras', JSON.stringify(compras));
})();

renderHoy();
